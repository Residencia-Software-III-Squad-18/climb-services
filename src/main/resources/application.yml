spring:
  application:
    name: climb-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits-long}
  expiration:
    access-token: 900000  # 15 minutes in milliseconds
    refresh-token: 604800000  # 7 days in milliseconds
  issuer: climb-api