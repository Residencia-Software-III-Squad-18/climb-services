spring:
  application:
    name: climb-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  mail:
    from: ${APP_MAIL_FROM:no-reply@climb.com}
  contract-notifications:
    expiration-warning-days: ${CONTRACT_EXPIRATION_WARNING_DAYS:30}
    expiration-cron: "${CONTRACT_EXPIRATION_CRON:0 0 8 * * *}"

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits-long}
  expiration:
    access-token: 900000
    refresh-token: 604800000
  issuer: climb-api

google:
  calendar:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID:}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:}
    frontend-url: ${GOOGLE_CALENDAR_FRONTEND_URL:http://localhost:5173}
    allowed-domain: ${GOOGLE_CALENDAR_ALLOWED_DOMAIN:}