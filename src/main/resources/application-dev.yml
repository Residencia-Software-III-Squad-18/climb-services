spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  # Flyway excluído da app - migrations rodam apenas no container dedicado no deploy
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

google:
  calendar:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID:}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_CALENDAR_REDIRECT_URI:}
    frontend-url: ${GOOGLE_CALENDAR_FRONTEND_URL:http://localhost:5173}
    allowed-domain: ${GOOGLE_CALENDAR_ALLOWED_DOMAIN:}